<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/><stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="sat12" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffe0b2"/><stop offset="100%" stop-color="#bcaaa4"/>
    </radialGradient>
    <radialGradient id="e12" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7"/><stop offset="100%" stop-color="#0277bd"/>
    </radialGradient>
    <radialGradient id="m12" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff8a65"/><stop offset="100%" stop-color="#d84315"/>
    </radialGradient>
    <radialGradient id="v12" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#c2185b"/>
    </radialGradient>
    <radialGradient id="s12" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/><stop offset="100%" stop-color="#ffc107"/>
    </radialGradient>
    <linearGradient id="arc12" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,213,79,0)" />
      <stop offset="50%" stop-color="rgba(255,213,79,0.3)" />
      <stop offset="100%" stop-color="rgba(255,213,79,0)" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg12)"/>
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(188,170,164,0.2)" stroke-width="2"/>
  
  <!-- Arc path for planets -->
  <path d="M80,260 Q256,80 432,260" fill="none" stroke="url(#arc12)" stroke-width="1.5"/>
  
  <!-- Planets on the arc (left to right, small to big) -->
  <!-- Mercury -->
  <circle cx="115" cy="225" r="6" fill="#9e9e9e"/>
  <!-- Venus -->
  <circle cx="180" cy="175" r="10" fill="url(#v12)"/>
  <!-- Earth -->
  <circle cx="250" cy="145" r="13" fill="url(#e12)"/>
  <circle cx="266" cy="138" r="3.5" fill="rgba(200,200,220,0.8)"/>
  <!-- Mars -->
  <circle cx="320" cy="160" r="9" fill="url(#m12)"/>
  <!-- Saturn (biggest, right side) -->
  <circle cx="400" cy="210" r="28" fill="url(#sat12)"/>
  <ellipse cx="400" cy="210" rx="48" ry="11" fill="none" stroke="rgba(188,170,164,0.5)" stroke-width="2.5"/>
  <ellipse cx="400" cy="210" rx="55" ry="13" fill="none" stroke="rgba(188,170,164,0.2)" stroke-width="1"/>
  <!-- Saturn bands -->
  <ellipse cx="400" cy="206" rx="24" ry="3" fill="rgba(141,110,99,0.2)"/>
  <ellipse cx="400" cy="215" rx="22" ry="2.5" fill="rgba(141,110,99,0.15)"/>
  
  <!-- Sun glow (far left, small) -->
  <circle cx="72" cy="250" r="15" fill="url(#s12)" opacity="0.7"/>
  <circle cx="72" cy="250" r="25" fill="rgba(255,193,7,0.06)"/>
  
  <!-- Stars -->
  <circle cx="150" cy="90" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="350" cy="85" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="320" r="1.2" fill="#ffd54f" opacity="0.3"/>
  <circle cx="430" cy="300" r="1" fill="white" opacity="0.4"/>
  <circle cx="260" cy="90" r="1.5" fill="white" opacity="0.3"/>
  
  <text x="256" y="395" text-anchor="middle" font-family="'Georgia',serif" font-weight="700" font-size="44" fill="white" letter-spacing="3">ASTRO</text>
  <text x="256" y="440" text-anchor="middle" font-family="'Georgia',serif" font-weight="300" font-size="28" fill="rgba(188,170,164,0.6)" letter-spacing="8">CURRENTS</text>
</svg>