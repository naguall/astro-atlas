<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#162447"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a840"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
    <linearGradient id="silver3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg3)"/>
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(201,168,64,0.3)" stroke-width="2"/>
  
  <!-- Star field -->
  <circle cx="90" cy="80" r="1.5" fill="#c9a840" opacity="0.6"/>
  <circle cx="410" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="70" cy="300" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="440" cy="250" r="1" fill="#c9a840" opacity="0.4"/>
  <circle cx="380" cy="340" r="1.5" fill="white" opacity="0.3"/>
  
  <!-- Outer circle -->
  <circle cx="256" cy="210" r="130" fill="none" stroke="url(#gold3)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="210" r="115" fill="none" stroke="rgba(201,168,64,0.2)" stroke-width="1"/>
    <line x1="256" y1="210" x2="256" y2="110" stroke="url(#gold3)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="210" x2="356" y2="210" stroke="url(#gold3)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="210" x2="256" y2="310" stroke="url(#gold3)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="210" x2="156" y2="210" stroke="url(#gold3)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="210" x2="305" y2="161" stroke="rgba(201,168,64,0.3)" stroke-width="1.5"/>
  <line x1="256" y1="210" x2="305" y2="259" stroke="rgba(201,168,64,0.3)" stroke-width="1.5"/>
  <line x1="256" y1="210" x2="207" y2="259" stroke="rgba(201,168,64,0.3)" stroke-width="1.5"/>
  <line x1="256" y1="210" x2="207" y2="161" stroke="rgba(201,168,64,0.3)" stroke-width="1.5"/>

  <!-- Center diamond -->
  <polygon points="256,170 286,210 256,250 226,210" fill="none" stroke="url(#gold3)" stroke-width="2"/>
  
  <!-- North arrow -->
  <polygon points="256,110 246,160 256,150 266,160" fill="url(#gold3)" opacity="0.8"/>
  
  <!-- Crescent moon (top right) -->
  <circle cx="340" cy="140" r="25" fill="url(#silver3)" opacity="0.8"/>
  <circle cx="352" cy="132" r="20" fill="url(#bg3)"/>
  
  <!-- Small stars -->
  <text x="170" y="148" font-size="14" fill="rgba(201,168,64,0.6)">✦</text>
  <text x="320" y="280" font-size="10" fill="rgba(201,168,64,0.4)">✦</text>
  <text x="190" y="275" font-size="12" fill="rgba(201,168,64,0.3)">✦</text>
  
  <!-- Text -->
  <text x="256" y="390" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-weight="700" font-size="42" fill="url(#gold3)" letter-spacing="4">ASTRO</text>
  <text x="256" y="432" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-weight="400" font-size="28" fill="rgba(201,168,64,0.6)" letter-spacing="6">CURRENT</text>
  
  <line x1="175" y1="445" x2="337" y2="445" stroke="rgba(201,168,64,0.3)" stroke-width="1"/>
</svg>