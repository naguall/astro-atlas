      <stop offset="0%" stop-color="#0d1b3e"/><stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <linearGradient id="sp11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.7"/>
